kind = "web"
previewPath = "/"
title = "Warehouse NAV"
version = "1.0.0"
id = "artifacts/warehouse-nav"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20188

[services.development]
run = "pnpm --filter @workspace/warehouse-nav run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/warehouse-nav", "run", "build" ]
publicDir = "artifacts/warehouse-nav/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20188"
BASE_PATH = "/"
